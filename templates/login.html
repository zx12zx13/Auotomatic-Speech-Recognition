<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Sistem Evaluasi Respons Lisan</title>
    <style>
        {% include "_tokens.css" %}
        {% include "_auth.css" %}
    </style>
</head>
<body>
    <div class="kartu-auth">
        <span class="gelombang" aria-hidden="true">
            <i style="--t:.35; --d:0s"></i><i style="--t:.7; --d:.12s"></i><i style="--t:1; --d:.24s"></i><i style="--t:.55; --d:.36s"></i><i style="--t:.85; --d:.48s"></i><i style="--t:.4; --d:.6s"></i><i style="--t:.65; --d:.72s"></i>
        </span>
        <h1>Sistem Evaluasi<br>Respons Lisan</h1>
        <p class="tagline">ASR &middot; Diarisasi &middot; Rubrik LLM</p>

        <form action="/login" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit">Masuk</button>
        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
        <p class="success">{{ success }}</p>
        {% endif %}

        <div class="tautan-bawah">
            Belum punya akun? <a href="/register">Daftar di sini</a>
        </div>
    </div>
</body>
</html>
