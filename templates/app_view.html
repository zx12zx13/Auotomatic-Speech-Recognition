<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Sistem Evaluasi Respons Lisan</title>
    <style>
        {% include "_tokens.css" %}
        {% include "_shell.css" %}

        .content {
            padding: 0;
            flex-grow: 1;
            min-height: 0; /* wajib agar iframe tidak memaksa tinggi berlebih */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <span class="gelombang" aria-hidden="true">
                <i style="--t:.4"></i><i style="--t:.8"></i><i style="--t:1"></i><i style="--t:.55"></i><i style="--t:.75"></i>
            </span>
            <div class="nama">Evaluasi Lisan<small>ASR &middot; Rubrik LLM</small></div>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="{{ 'active' if active_page == 'dashboard' else '' }}"><span class="icon">&#9632;</span> Dashboard</a>
            <a href="/app/analisis" class="{{ 'active' if active_page == 'analisis' else '' }}"><span class="icon">&#9835;</span> Analisis Audio</a>
            <a href="/app/histori" class="{{ 'active' if active_page == 'histori' else '' }}"><span class="icon">&#9776;</span> Histori</a>
            <a href="/app/nilai" class="{{ 'active' if active_page == 'nilai' else '' }}"><span class="icon">&#10003;</span> Penilaian</a>
        </nav>
        <div class="user-profile">
            <div class="avatar">{{ user.username[0] | upper }}</div>
            <div>
                <div class="username">{{ user.username }}</div>
                <span class="peran">Guru</span>
            </div>
        </div>
    </aside>

    <div class="main-wrapper">
        <header class="header">
            <h1>{{ title }}</h1>
            <form class="logout-form" action="/logout" method="post">
                <button type="submit">Keluar</button>
            </form>
        </header>

        <main class="content">
            <!-- allow="microphone" WAJIB: modul analisis dimuat di dalam iframe,
                 dan peramban memblokir akses mikrofon pada iframe yang tidak
                 mendapat pendelegasian izin secara eksplisit. Tanpa atribut ini,
                 tombol rekam tampil normal tetapi tidak menghasilkan audio apa pun. -->
            <iframe src="{{ iframe_src }}" allow="microphone"></iframe>
        </main>
    </div>
</body>
</html>
