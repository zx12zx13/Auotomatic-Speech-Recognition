<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Sistem Evaluasi Respons Lisan</title>
    <style>
        {% include "_tokens.css" %}
        {% include "_auth.css" %}
    </style>
</head>
<body>
    <div class="kartu-auth">
        <span class="gelombang" aria-hidden="true">
            <i style="--t:.35; --d:0s"></i><i style="--t:.7; --d:.12s"></i><i style="--t:1; --d:.24s"></i><i style="--t:.55; --d:.36s"></i><i style="--t:.85; --d:.48s"></i><i style="--t:.4; --d:.6s"></i><i style="--t:.65; --d:.72s"></i>
        </span>
        <h1>Buat Akun Guru</h1>
        <p class="tagline">Sistem Evaluasi Respons Lisan</p>

        {% if error %}
        <p class="error" style="margin: 0 0 1.2rem">{{ error }}</p>
        {% endif %}
        {% if success %}
        <p class="success" style="margin: 0 0 1.2rem">{{ success }}</p>
        {% endif %}

        <form action="/register" method="post">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>
            <label for="confirm_password">Konfirmasi Password</label>
            <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required>
            <button type="submit">Daftar</button>
        </form>

        <div class="tautan-bawah">
            Sudah punya akun? <a href="/login">Masuk di sini</a>
        </div>
    </div>
</body>
</html>
